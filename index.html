<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ถึงนกุล ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    width:90%;
    max-width:450px;
}

h1{
    color:#ff4f87;
}

p{
    color:#555;
    line-height:1.6;
}

.buttons{
    margin-top:25px;
    position:relative;
    height:120px;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

#yes{
    background:#ff4f87;
    color:white;
}

#yes:hover{
    transform:scale(1.05);
}

#no{
    background:#ddd;
    position:absolute;
    left:220px;
}
</style>
</head>

<body>

<div class="box">
<h1>เราขอโทษนะ ❤️</h1>

<p>
เรารู้ว่าที่ผ่านมาทำให้เองเสียใจ<br>
เราขอโทษจริง ๆ<br><br>

เราไม่อยากเสียเองไปเลย<br>
ขอโอกาสให้เราได้แก้ตัวอีกครั้งได้ไหม...
</p>

<div class="buttons">
<button id="yes">💖 ให้อภัยเรา</button>
<button id="no">💔 ยังไม่ให้อภัย</button>
</div>

</div>

<script>
const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{
    const x=Math.random()*250;
    const y=Math.random()*80;
    no.style.left=x+"px";
    no.style.top=y+"px";
});

document.getElementById("yes").onclick=()=>{
    document.body.innerHTML=`
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ffe6ef;font-family:Arial;text-align:center;">
        <div>
            <h1 style="color:#ff4f87;">🥹 ขอบคุณนะ ❤️</h1>
            <h2>เค้าสัญญาว่าจะทำให้ดีกว่านี้</h2>
            <h3>รักเธอที่สุดเลย 🤍</h3>
        </div>
    </div>`;
}
</script>

</body>
</html>
