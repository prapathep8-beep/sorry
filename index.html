<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ถึงนกุล ❤️</title>
.heart{
    position:fixed;
    font-size:25px;
    animation:float 3s linear forwards;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(-400px) scale(1.8);
        opacity:0;
    }
}
<style>
const no=document.getElementById("no");

function moveButton(){
    const maxX=window.innerWidth-150;
    const maxY=window.innerHeight-80;

    no.style.position="fixed";
    no.style.left=Math.random()*maxX+"px";
    no.style.top=Math.random()*maxY+"px";
}

no.addEventListener("mouseover",moveButton);
no.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    moveButton();
});

document.getElementById("yes").onclick=()=>{

    // สร้างหัวใจลอย
    for(let i=0;i<40;i++){
        const heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top=(window.innerHeight-50)+"px";
        heart.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }

    setTimeout(()=>{
        document.body.innerHTML=`
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ffe6ef;text-align:center;font-family:Arial;">
            <div>
                <h1 style="font-size:48px;">🥹❤️</h1>
                <h1 style="color:#ff4f87;">ขอบคุณนะเอง</h1>
                <h2>เราสัญญาว่าจะไม่ทำแบบนี้อีกแล้ว</h2>
                <h3>รักเองที่สุดเลย 🤍</h3>
            </div>
        </div>
        `;
    },1200);
};
